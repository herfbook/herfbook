services:
  herfbook-api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: herfbook-db
    volumes:
      - ./backend:/app
    command: ["--reload"]
    depends_on:
      herfbook-db:
        condition: service_healthy
      herfbook-minio:
        condition: service_started
    ports:
      - "8005:8000"
    networks:
      - herfbook-dev

  herfbook-db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5435:5432"
    networks:
      - herfbook-dev

  herfbook-minio:
    image: minio/minio
    restart: unless-stopped
    env_file: .env
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9005:9000"
      - "9006:9001"
    networks:
      - herfbook-dev

  herfbook-web:
    # Dev image: serves frontend/dist via Nginx with a runtime volume
    # mount. Run `npm run build` (or `npm run build -- --watch`) in
    # ./frontend on the host to populate dist; changes appear
    # immediately. For day-to-day frontend dev, prefer `npm run dev`
    # on :5174 which proxies /api to :8005 directly.
    build:
      context: .
      dockerfile: Dockerfile.web.dev
    restart: unless-stopped
    depends_on:
      - herfbook-api
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    networks:
      - herfbook-dev

networks:
  herfbook-dev:
    name: herfbook-dev

volumes:
  postgres_data:
  minio_data:
