name: Security

on:
  push:
    branches: [main]
  release:
    types: [published]
  schedule:
    - cron: "0 0 * * 0"  # weekly, Sunday midnight UTC

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python]
        # Add javascript here when the frontend is set up

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  dependency-scan:
    name: Dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - name: Node.js audit (npm audit)
        if: hashFiles('frontend/package-lock.json') != ''
        run: cd frontend && npm audit --audit-level=high

  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build API image for scanning
        run: docker build -t herfbook-api-scan ./backend

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: herfbook-api-scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
