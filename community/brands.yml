# HerfBook Community Seed Data — Cigar Brands
# License: CC BY-SA 4.0
# Source: Wikipedia "List of cigar brands" (CC BY-SA 3.0), manufacturer
#         catalogs, Cigar Aficionado, Halfwheel, public industry data.
#         Brand names are factual data and not copyrightable.
# Last updated: 2026-05-10
#
# Conventions:
#  - Each entry is a PARENT BRAND, not a brand+line combo. Lines live in
#    community/lines.yml and FK-reference these brands by name.
#  - For brands with Cuban (Habanos S.A.) and Non-Cuban variants, both are
#    listed separately. lines.yml entries should specify which variant
#    they belong to via the disambiguated brand name (e.g.,
#    "Cohiba (Cuban)" vs "Cohiba (Non-Cuban)").
#  - The `name` field is what lines.yml references in its `brand:` field.
#    Match must be exact (case-sensitive, punctuation-sensitive).

