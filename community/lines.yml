# HerfBook Community Seed Data — Cigar Lines
# License: CC BY-SA 4.0
# Source: Industry-standard reference (manufacturer catalogs, Cigar Aficionado,
#         Halfwheel, common cigar knowledge). Line names are factual data and
#         not copyrightable.
# Last updated: 2026-05-10
#
# Structure: each entry has `name` and `brand` (matching brand.name in brands.yml).
# Sync will resolve brand -> brand_id FK at seed time. Entries without a matching
# brand are logged as warnings and skipped (not failed).
#
# This is a starter set of ~50 brands' well-known canonical lines, ~350 entries.
# Users add their own via the lookup combobox; contributions flow back as PRs.

